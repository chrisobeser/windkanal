# CI: Tests + R CMD check bei jedem Push (To-do B6 / Schwaeche G6).
# Das strukturelle Gegenmittel gegen "Commit rutscht vor der
# Testauswertung durch": GitHub baut und prueft jede Version selbst.
# Hinweis: Falls 'bcf' auf CRAN nicht verfuegbar ist, schlaegt die
# Dependency-Installation fehl -> dann bcf aus Suggests-Installation
# nehmen (Tests ueberspringen bcf via skip_if_not_installed).
on:
  push:
    branches: [main]
  pull_request:

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rcmdcheck
            url::https://cran.r-project.org/src/contrib/Archive/LongituRF/LongituRF_0.9.tar.gz
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
